services:
  api:
    container_name: product-api

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    volumes:
      - ./Data:/app/Data

    environment:
      ASPNETCORE_ENVIRONMENT: Development

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/swagger"]
      interval: 30s
      timeout: 5s
      retries: 3