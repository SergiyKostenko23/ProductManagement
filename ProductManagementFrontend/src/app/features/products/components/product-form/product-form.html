<mat-card>

  <mat-card-header>
    <mat-card-title>Product</mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>

        <input
          matInput
          formControlName="name">

        <mat-error *ngIf="form.controls.name.hasError('required')">
          Name is required.
        </mat-error>

      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>

        <input
          matInput
          formControlName="category">

        <mat-error *ngIf="form.controls.category.hasError('required')">
          Category is required.
        </mat-error>

      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Price</mat-label>

        <input
          matInput
          type="number"
          formControlName="price">

        <mat-error *ngIf="form.controls.price.hasError('required')">
          Price is required.
        </mat-error>

        <mat-error *ngIf="form.controls.price.hasError('min')">
          Price cannot be negative.
        </mat-error>

      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Stock</mat-label>

        <input
          matInput
          type="number"
          formControlName="stock">

        <mat-error *ngIf="form.controls.stock.hasError('required')">
          Stock is required.
        </mat-error>

        <mat-error *ngIf="form.controls.stock.hasError('min')">
          Stock cannot be negative.
        </mat-error>

      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>

        <textarea
          matInput
          rows="5"
          formControlName="description">
        </textarea>

      </mat-form-field>

      <div class="actions">

        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="form.invalid">

          {{ buttonText }}

        </button>

      </div>

    </form>

  </mat-card-content>

</mat-card>
