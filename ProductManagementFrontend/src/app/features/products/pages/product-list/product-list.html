<div class="toolbar">

    <h1>Products</h1>

    <div class="toolbar-right">

        <mat-form-field
            appearance="outline"
            class="search-field">

            <mat-label>Search products</mat-label>

            <input
                matInput
                [(ngModel)]="searchText"
                (ngModelChange)="onFiltersChanged()">

        </mat-form-field>

    <mat-form-field
        appearance="outline"
        class="stock-field">

        <mat-label>Min Stock</mat-label>

        <input
            matInput
            type="number"
            [(ngModel)]="minStock"
            (ngModelChange)="onFiltersChanged()">

    </mat-form-field>

    <mat-form-field
        appearance="outline"
        class="stock-field">

        <mat-label>Max Stock</mat-label>

        <input
            matInput
            type="number"
            [(ngModel)]="maxStock"
            (ngModelChange)="onFiltersChanged()">

    </mat-form-field>

    <button
        mat-button
        (click)="resetFilters()">

        Reset

    </button>

    <button
        mat-raised-button
        color="accent"
        routerLink="/products/new">

        New Product

    </button>

  </div>

</div>

<table
  mat-table
  [dataSource]="dataSource"
  matSort
  class="mat-elevation-z2">

  <!-- Product Number -->
  <ng-container matColumnDef="productNumber">

    <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Number
    </th>

    <td mat-cell *matCellDef="let product">
        {{ product.productNumber }}
    </td>

  </ng-container>

  <!-- Name -->
  <ng-container matColumnDef="name">

    <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Name
    </th>

    <td mat-cell *matCellDef="let product">

      <a [routerLink]="['/products', product.id]">

        {{ product.name }}

      </a>

    </td>

  </ng-container>

  <!-- Category -->
  <ng-container matColumnDef="category">

    <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Category
    </th>

    <td mat-cell *matCellDef="let product">

        <mat-chip>

            {{ product.category }}

        </mat-chip>

    </td>

  </ng-container>

    <!-- Price -->
    <ng-container matColumnDef="price">

        <th mat-header-cell *matHeaderCellDef mat-sort-header>
            Price
        </th>

        <td mat-cell *matCellDef="let product">

        {{ product.price | currency }}

        </td>

    </ng-container>

    <!-- Stock -->
    <ng-container matColumnDef="stock">

    <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Stock
    </th>

    <td mat-cell *matCellDef="let product">

        <div class="stock-cell">

        <span
            class="stock-badge"
            [ngClass]="getStockClass(product)">

            {{ product.stock }}

        </span>

        <small>

            {{ getStockStatus(product) }}

        </small>

        </div>

    </td>

    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">

        <th mat-header-cell *matHeaderCellDef>
        Actions
        </th>

        <td mat-cell *matCellDef="let product">

        <button
            mat-icon-button
            color="primary"
            [routerLink]="['/products', product.id]">

            <mat-icon>visibility</mat-icon>

        </button>

        <button
            mat-icon-button
            color="primary"
            [routerLink]="['/products', product.id, 'edit']">

            <mat-icon>edit</mat-icon>

        </button>

        <button
            mat-icon-button
            color="warn"
            (click)="delete(product)">

            <mat-icon>delete</mat-icon>

        </button>

        </td>

    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5,10,25,50]"
    showFirstLastButtons>
</mat-paginator>
