<h2 mat-dialog-title>

  {{ data.title }}

</h2>

<mat-dialog-content>

  <mat-form-field appearance="outline">

    <mat-label>{{ data.label }}</mat-label>

    <input
      matInput
      type="number"
      min="1"
      [(ngModel)]="quantity">

  </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button
    mat-button
    (click)="cancel()">

    Cancel

  </button>

  <button
    mat-raised-button
    color="primary"
    (click)="confirm()">

    {{ data.confirmText }}

  </button>

</mat-dialog-actions>
